name: Trigger Deploy

on:
  push:
    branches:
      - main

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger jk-portfolio-deploy pipeline
        run: |
          curl -X POST \
            -H "Authorization: token ${{ secrets.DEPLOY_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/jjkst/jk-portfolio-deploy/dispatches \
            -d '{"event_type":"deploy","client_payload":{"repo":"${{ github.repository }}"}}'